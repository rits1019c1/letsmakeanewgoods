<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>CONCEPT ± LAB | 概念の演算器</title>
    <meta name="description" content="既存の概念を掛け合わせ、引き、割り、新しいイノベーションの種を発見する。">
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="CONCEPT ± LAB | 概念の演算器">
    <meta property="og:description" content="既存の概念を掛け合わせ、引き、割り、新しいイノベーションの種を発見する実験場。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://concept-lab.example.com">
    <meta property="og:image" content="https://placehold.co/1200x630/0f172a/ffffff?text=CONCEPT+LAB">
    <meta name="twitter:card" content="summary_large_image">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        @font-face {
            font-family: '2045alphabet';
            src: url('https://ec2045.github.io/2045font/2045alphabet.otf') format('opentype');
            font-display: swap;
        }

        body {
            font-family: '2045alphabet', 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .custom-font {
            font-family: '2045alphabet', sans-serif;
        }

        .slot-card {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: white;
            border: 4px solid #f1f5f9;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .slot-card.spinning {
            transform: scale(0.98) translateY(8px);
            filter: blur(4px);
            opacity: 0.6;
        }

        .operator-circle {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 900;
            font-size: 2.2rem;
            transition: all 0.3s;
            z-index: 10;
        }

        .op-multiply { background: #3b82f6; color: white; }
        .op-subtract { background: #f43f5e; color: white; }
        .op-hybrid   { background: #10b981; color: white; }
        
        .btn-main {
            background: #0f172a;
            color: white;
            transition: all 0.2s;
            box-shadow: 0 10px 20px -5px rgba(15, 23, 42, 0.2);
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 15px 30px -5px rgba(15, 23, 42, 0.3); }
        .btn-main:active { transform: scale(0.95); }

        .success-banner {
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounceIn {
            0% { transform: translateY(-20px) scale(0.8); opacity: 0; }
            70% { transform: translateY(5px) scale(1.05); opacity: 1; }
            100% { transform: translateY(0) scale(1); }
        }

        /* 履歴カードの装飾 */
        .history-item {
            border-left-width: 6px;
        }
    </style>
</head>
<body class="p-6 md:p-12">
    <div id="app" class="max-w-6xl mx-auto">
        <header class="mb-16 text-center">
            <div class="inline-block border-2 border-slate-900 text-slate-900 px-6 py-1 rounded-full text-[10px] font-black tracking-[0.4em] mb-6 uppercase">Concept Multiplier Lab</div>
            <h1 class="text-5xl md:text-8xl font-black text-slate-900 tracking-tighter mb-4 custom-font">
                CONCEPT <span id="header-op" class="text-slate-300">±</span> LAB
            </h1>
            <p class="text-slate-400 font-bold text-xs tracking-widest uppercase mt-4">Multiply, Subtract, or Hybridize for Innovation.</p>
        </header>

        <main class="relative bg-white border border-slate-100 rounded-[3rem] md:rounded-[5rem] p-10 md:p-24 mb-20 shadow-xl">
            <!-- Existing Success Detection Badge -->
            <div id="detection-badge" class="absolute inset-x-0 -top-8 flex justify-center opacity-0 pointer-events-none transition-all duration-300 scale-90">
                <div class="bg-amber-400 text-slate-900 border-4 border-white px-10 py-4 rounded-full font-black shadow-2xl">
                    <div class="text-[10px] uppercase tracking-widest opacity-70 mb-1">EXISTING INNOVATION</div>
                    <div id="match-result-name" class="text-xl md:text-2xl custom-font">NAME</div>
                </div>
            </div>

            <div class="flex flex-col lg:flex-row items-center justify-center gap-10 lg:gap-20">
                <!-- Card A -->
                <div class="w-full lg:w-5/12 text-center">
                    <div id="card-a" class="slot-card h-56 md:h-80 rounded-[4rem] flex items-center justify-center p-10">
                        <span id="text-a" class="text-3xl md:text-5xl font-black text-slate-800 break-all leading-tight custom-font">START</span>
                    </div>
                </div>

                <!-- Operator -->
                <div class="relative flex items-center justify-center">
                    <div id="operator-container" class="operator-circle op-multiply shadow-lg">
                        <span id="operator-symbol" class="custom-font">×</span>
                    </div>
                    <!-- Hybrid Divider Text -->
                    <div id="hybrid-divider" class="absolute -bottom-12 whitespace-nowrap text-[11px] font-black text-emerald-500 opacity-0 transition-opacity tracking-tighter custom-font">
                        DIVIDE BY 2
                    </div>
                </div>

                <!-- Card B -->
                <div class="w-full lg:w-5/12 text-center">
                    <div id="card-b" class="slot-card h-56 md:h-80 rounded-[4rem] flex items-center justify-center p-10">
                        <span id="text-b" class="text-3xl md:text-5xl font-black text-slate-800 break-all leading-tight custom-font">SYSTEM</span>
                    </div>
                </div>
            </div>

            <div class="mt-20 flex flex-col items-center gap-8">
                <button id="btn-spin" class="btn-main px-20 py-8 rounded-full font-black text-2xl tracking-[0.2em] uppercase custom-font">
                    SPIN FORMULA
                </button>
                <button id="btn-copy-main" class="invisible group flex items-center gap-4 text-slate-400 hover:text-slate-900 transition-colors font-black text-xs tracking-[0.3em] uppercase">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                    <span>Copy Result</span>
                </button>
            </div>
        </main>

        <section class="max-w-5xl mx-auto">
            <div class="flex items-center justify-between mb-12 border-b-4 border-slate-100 pb-8">
                <div class="flex items-center gap-6">
                    <h2 class="text-2xl font-black text-slate-800 tracking-tighter custom-font">DISCOVERY ARCHIVE</h2>
                    <span id="history-count" class="bg-slate-900 text-white px-4 py-1 rounded-full text-xs font-black custom-font">0</span>
                </div>
                <button id="btn-clear" class="text-xs font-black text-slate-300 hover:text-red-500 transition-colors uppercase tracking-widest">Destroy Archive</button>
            </div>
            <div id="log-container" class="grid grid-cols-1 md:grid-cols-2 gap-8 pb-32">
                <!-- Empty Placeholder -->
                <div id="empty-msg" class="col-span-full text-center py-32 bg-slate-50/50 rounded-[4rem] border-4 border-dashed border-slate-100">
                    <p class="text-slate-300 font-black text-xs uppercase tracking-[0.5em]">No lab data recorded yet.</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        const wordsA = [
            '鳩', 'お風呂の給湯器', '炊飯器', '自転車', '歯ブラシ', '傘', '鏡', '窓ガラス', '玄関の鍵', 
            '冷蔵庫', 'トイレ', 'オフィスチェア', '信号機', '自販機', '街灯', 'ゴミ箱', '靴', '観葉植物', 
            '犬の首輪', 'メガネ', '財布', '枕', 'カーテン', 'まな板', '洗濯機', 'エレベーター', '駐車場', 
            '病院', '公園', 'タクシー', '刑務所', '図書館', '神社', '墓地', 'カラス', 'ドローン', '3Dプリンタ',
            'コンビニ', 'お弁当', 'ランドセル', '教科書', '履歴書', '領収書', '処方箋', '腕時計', 'カメラ',
            '車', '本', '音楽プレイヤー', '電話', '地図', '日記', '問い', 'ニュース', 'レシピ', '薬', '映画',
            'iPhone', 'MacBook', 'ノートPC', 'タブレット', 'スマートウォッチ', 'スニーカー', '革靴', 'スーツ',
            '掃除機', '地雷探知機', '扇風機', 'エアコン', 'ベッド', 'テント', 'コーヒー', 'ジュース', '嘘', '脳波',
            '感情', '匂い', '嘘発見器', '多機能携帯', '放送', 'テレビ', '店舗', 'ピカチュウ', 'イーロン・マスク'
        ];

        const wordsB = [
            '24時間営業', '顔認証', 'サブスク', 'API', 'ブロックチェーン', 'ChatGPT', '音声合成', 
            '骨伝導', '非接触', '透明化', '自己修復', '太陽光発電', 'ワイヤレス充電', '生体認証', 
            '投げ銭', 'シェアリング', 'ポータブル', '空飛ぶ', '自動追従', 'GPS連携', 'においセンサー',
            'いびき検知', '温度調節', '水中対応', '宇宙対応', 'リモート操作', '超高速',
            'ジュース', '物理ボタン', 'テンキー', '電源コード', 'ガソリン', '運転手', '画面', '重力',
            '沈黙', '感情', '広告', '待ち時間', '場所', '国境', '法律', '人間', '実体', '羽根', '紙', '針',
            '中央銀行', 'Mac', 'iPhone', 'iPad', 'ノートPC', 'バイク', 'スクーター', '問い'
        ];

        const successCases = {
            '洗濯機×24時間営業': 'コインランドリー',
            '電話×ポータブル': '携帯電話 / iPhone',
            '音楽プレイヤー×ポータブル': 'Walkman / iPod',
            '車×シェアリング': 'Uber / カーシェア',
            '本×サブスク': 'Kindle Unlimited',
            '掃除機×地雷探知機': 'ルンバ',
            '傘×シェアリング': 'アイカサ',
            '玄関の鍵×顔認証': 'スマートロック',
            '腕時計×ポータブル': 'スマートウォッチ',
            '自転車×シェアリング': 'シェアサイクル',
            '駐車場×シェアリング': 'akippa',
            '財布×非接触': '電子マネー',
            '窓ガラス×透明化': '調光ガラス',
            '問い×ジュース': 'ムリンス',
            '多機能携帯−物理ボタン': 'iPhone / スマートフォン',
            '多機能携帯−テンキー': 'iPhone / スマートフォン',
            '掃除機−電源コード': 'コードレス掃除機',
            '車−運転手': '自動運転車',
            '扇風機−羽根': 'ダイソン Air Multiplier',
            '財布−実体': 'デジタルウォレット',
            '本−紙': '電子書籍',
            'テレビ−放送': 'スマートTV / Netflix',
            '時計−針': 'デジタル時計',
            'オフィス−場所': 'リモートワーク / Slack',
            'iPhone⊕Mac': 'iPad',
            'iPhone⊕MacBook': 'iPad',
            'ノートPC⊕タブレット': 'Surface / 2-in-1 PC',
            '自転車⊕バイク': '電動キックボード',
            '自転車⊕スクーター': '電動キックボード',
            '本⊕テレビ': 'Kindle / 電子書籍リーダー',
            'スニーカー⊕革靴': 'レザースニーカー',
            '車⊕飛行機': '空飛ぶクルマ',
            '鳩×時計': '鳩時計'
        };

        const state = {
            currentA: "",
            currentB: "",
            currentOp: "×",
            history: []
        };

        const btnSpin = document.getElementById('btn-spin');
        const btnCopyMain = document.getElementById('btn-copy-main');
        const btnClear = document.getElementById('btn-clear');
        const textA = document.getElementById('text-a');
        const textB = document.getElementById('text-b');
        const operatorSymbol = document.getElementById('operator-symbol');
        const operatorContainer = document.getElementById('operator-container');
        const hybridDivider = document.getElementById('hybrid-divider');
        const detectionBadge = document.getElementById('detection-badge');
        const matchResultName = document.getElementById('match-result-name');
        const logContainer = document.getElementById('log-container');
        const emptyMsg = document.getElementById('empty-msg');
        const historyCount = document.getElementById('history-count');

        function spin() {
            btnSpin.disabled = true;
            btnCopyMain.style.visibility = "hidden";
            detectionBadge.classList.add('opacity-0');
            detectionBadge.classList.remove('success-banner');
            
            const cardA = document.getElementById('card-a');
            const cardB = document.getElementById('card-b');
            cardA.classList.add('spinning');
            cardB.classList.add('spinning');

            let count = 0;
            const max = 15;

            const interval = setInterval(() => {
                const tempA = wordsA[Math.floor(Math.random() * wordsA.length)];
                const tempB = wordsB[Math.floor(Math.random() * wordsB.length)];
                
                const rand = Math.random();
                let tempOp = "×";
                if (rand > 0.6) tempOp = "−";
                if (rand > 0.8) tempOp = "⊕";
                
                textA.textContent = tempA;
                textB.textContent = tempB;
                operatorSymbol.textContent = tempOp;
                
                updateOperatorStyle(tempOp);

                count++;
                if (count > max) {
                    clearInterval(interval);
                    finalizeSpin(tempA, tempB, tempOp);
                }
            }, 100);
        }

        function updateOperatorStyle(op) {
            operatorContainer.className = "operator-circle shadow-lg";
            hybridDivider.classList.add('opacity-0');

            if (op === "×") {
                operatorContainer.classList.add('op-multiply');
            } else if (op === "−") {
                operatorContainer.classList.add('op-subtract');
            } else {
                operatorContainer.classList.add('op-hybrid');
                hybridDivider.classList.remove('opacity-0');
            }
        }

        function finalizeSpin(a, b, op) {
            state.currentA = a;
            state.currentB = b;
            state.currentOp = op;
            
            document.getElementById('card-a').classList.remove('spinning');
            document.getElementById('card-b').classList.remove('spinning');
            
            const formula = `${a}${op}${b}`;
            const foundName = successCases[formula];

            if (foundName) {
                matchResultName.textContent = foundName;
                detectionBadge.classList.remove('opacity-0');
                detectionBadge.classList.add('success-banner');
            }

            btnSpin.disabled = false;
            btnCopyMain.style.visibility = "visible";
            
            saveHistory(a, b, op, foundName);
        }

        function saveHistory(a, b, op, match) {
            const entry = { 
                a, b, op, match, 
                id: Date.now(),
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) 
            };
            state.history.unshift(entry);
            renderHistory();
        }

        function renderHistory() {
            historyCount.textContent = state.history.length;
            if (state.history.length > 0) {
                emptyMsg.style.display = 'none';
            }
            
            logContainer.innerHTML = "";
            state.history.forEach((item) => {
                const div = document.createElement('div');
                const opColor = item.op === '×' ? 'border-blue-500' : (item.op === '−' ? 'border-rose-500' : 'border-emerald-500');
                const opSymbolColor = item.op === '×' ? 'text-blue-500' : (item.op === '−' ? 'text-rose-500' : 'text-emerald-500');
                
                div.className = `bg-white p-8 rounded-[2.5rem] history-item border-2 border-slate-100 ${opColor} flex items-center justify-between group transition-all hover:shadow-2xl hover:-translate-y-1 relative overflow-hidden`;
                
                if (item.match) {
                    const glow = document.createElement('div');
                    glow.className = "absolute inset-0 bg-amber-400/5 pointer-events-none";
                    div.appendChild(glow);
                }

                let matchHtml = item.match ? 
                    `<div class="text-[9px] font-black text-amber-600 bg-amber-100 px-3 py-1 rounded-full mb-3 inline-block custom-font tracking-widest uppercase">Legacy Detected: ${item.match}</div>` : '';

                div.innerHTML += `
                    <div class="flex-1">
                        ${matchHtml}
                        <div class="text-2xl font-black text-slate-800 leading-tight custom-font">
                            ${item.a} <span class="${opSymbolColor} mx-1">${item.op}</span> ${item.b}
                            ${item.op === '⊕' ? '<span class="text-[11px] text-emerald-400 ml-1">/ 2</span>' : ''}
                        </div>
                        <div class="text-[9px] font-bold text-slate-300 mt-4 uppercase tracking-[0.4em]">${item.time}</div>
                    </div>
                    <button onclick="copySpecific('${item.a} ${item.op} ${item.b}', this)" class="opacity-0 group-hover:opacity-100 transition-all text-[10px] font-black text-slate-400 hover:text-slate-900 px-6 py-3 bg-slate-50 border border-slate-100 rounded-full custom-font tracking-widest">
                        COPY
                    </button>
                `;
                logContainer.appendChild(div);
            });
        }

        function copyText(text, btn) {
            const tempInput = document.createElement('textarea');
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            
            const originalContent = btn.innerHTML;
            btn.innerHTML = "<span class='text-emerald-500'>COPIED!</span>";
            setTimeout(() => { btn.innerHTML = originalContent; }, 1200);
        }

        window.copySpecific = (text, btn) => copyText(text, btn);

        btnSpin.addEventListener('click', spin);
        btnCopyMain.addEventListener('click', () => {
            let formulaText = `${state.currentA} ${state.currentOp} ${state.currentB}`;
            if (state.currentOp === '⊕') formulaText += " / 2";
            copyText(formulaText, btnCopyMain);
        });

        btnClear.addEventListener('click', () => {
            state.history = [];
            renderHistory();
            emptyMsg.style.display = 'block';
            historyCount.textContent = "0";
        });

        window.onload = () => {
            console.log("Concept Lab V3: 2045Alphabet & OG Mode Active");
        };
    </script>
</body>
</html>
